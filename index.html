<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Menu</title>

  <style>
    /* ============================
       RESET BÁSICO
       ============================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f9f9f9;
    }

    /* ============================
       BOTÓN FLOTANTE
       ============================ */
    .admin-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: #111;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 1002;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .admin-toggle:hover {
      transform: scale(1.1);
      background: #333;
    }

    .admin-toggle.active {
      transform: rotate(90deg);
    }

    /* ============================
       OVERLAY (FONDO OSCURO)
       ============================ */
    .admin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      z-index: 1000;
      pointer-events: none;
      transition: background 0.35s ease;
    }

    .admin-overlay.active {
      background: rgba(0, 0, 0, 0.5);
      pointer-events: all;
    }

    /* ============================
       BARRA DECORATIVA MÓVIL
       ============================ */
    .admin-grab {
      display: none;
    }

    /* ============================
       MENÚ ADMIN - DESKTOP
       ============================ */
    .admin-menu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 440px;
      max-height: 80vh;
      overflow-y: auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      z-index: 1001;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .admin-menu.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: all;
    }

    /* ============================
       HEADER DEL MENÚ
       ============================ */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .admin-header h2 {
      margin: 0;
      font-size: 20px;
      color: #111;
    }

    .admin-close {
      border: none;
      background: #f0f0f0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .admin-close:hover {
      background: #ddd;
    }

    /* ============================
       CONTENIDO DEL MENÚ
       ============================ */
    .admin-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .admin-content button {
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: #f5f5f5;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .admin-content button:hover {
      background: #e8e8e8;
      transform: translateX(4px);
    }

    .admin-content button:active {
      transform: scale(0.98);
    }

    /* ============================
       VERSIÓN MÓVIL
       ============================ */
    @media (max-width: 768px) {

      .admin-toggle {
        width: 62px;
        height: 62px;
        font-size: 28px;
        bottom: 18px;
        right: 18px;
      }

      .admin-menu {
        top: auto;
        left: 0;
        bottom: 0;
        width: 100%;
        max-width: 100%;
        max-height: 85vh;
        border-radius: 20px 20px 0 0;
        padding: 12px 20px 30px 20px;
        transform: translateY(100%);
        opacity: 1;
        transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      }

      .admin-menu.active {
        transform: translateY(0);
      }

      .admin-grab {
        display: block;
        width: 40px;
        height: 5px;
        background: #ccc;
        border-radius: 10px;
        margin: 0 auto 14px auto;
      }

      .admin-header h2 {
        font-size: 18px;
      }

      .admin-content button {
        padding: 16px;
        font-size: 16px;
        border-radius: 14px;
      }

      .admin-content button:hover {
        transform: none;
      }

      .admin-content button:active {
        background: #e0e0e0;
        transform: scale(0.97);
      }

      .admin-close {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }

    /* ============================
       SCROLLBAR BONITO
       ============================ */
    .admin-menu::-webkit-scrollbar {
      width: 6px;
    }

    .admin-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .admin-menu::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- Botón flotante -->
  <button id="adminToggle" class="admin-toggle" onclick="toggleAdminMenu()">⚙️</button>

  <!-- Fondo oscuro -->
  <div id="adminOverlay" class="admin-overlay" onclick="toggleAdminMenu()"></div>

  <!-- Menú Admin -->
  <div id="adminMenu" class="admin-menu">
    <div class="admin-grab"></div>

    <div class="admin-header">
      <h2>Panel Admin</h2>
      <button class="admin-close" onclick="toggleAdminMenu()">✕</button>
    </div>

    <div class="admin-content">
      <button>📝 Editar portada</button>
      <button>🖼️ Subir imagen</button>
      <button>👥 Ver usuarios</button>
      <button>📊 Estadísticas</button>
      <button>🔒 Seguridad</button>
      <button>⚙️ Configuración</button>
    </div>
  </div>

  <script>
    function toggleAdminMenu() {
      const menu = document.getElementById("adminMenu");
      const overlay = document.getElementById("adminOverlay");
      const toggle = document.getElementById("adminToggle");

      const isOpen = menu.classList.contains("active");

      if (isOpen) {
        menu.classList.remove("active");
        overlay.classList.remove("active");
        toggle.classList.remove("active");
        document.body.style.overflow = "";
      } else {
        menu.classList.add("active");
        overlay.classList.add("active");
        toggle.classList.add("active");
        document.body.style.overflow = "hidden";
      }
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        const menu = document.getElementById("adminMenu");
        if (menu.classList.contains("active")) {
          toggleAdminMenu();
        }
      }
    });
  </script>

</body>
</html>
